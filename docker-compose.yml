version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nirixense_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nirixense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nirixense_password}
      POSTGRES_DB: ${POSTGRES_DB:-nirixense_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nirixense_net

  redis:
    image: redis:7-alpine
    container_name: nirixense_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nirixense_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nirixense_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-nirixense}:${POSTGRES_PASSWORD:-nirixense_password}@db:5432/${POSTGRES_DB:-nirixense_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretkey}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    networks:
      - nirixense_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nirixense_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - nirixense_net

volumes:
  postgres_data:
  redis_data:

networks:
  nirixense_net:
    driver: bridge
